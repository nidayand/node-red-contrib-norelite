     ********************************************* -->
<script type="text/x-red" data-template-name="nrl-value in">
    <div class="form-row">
        <label for="node-input-slider"><i class="fa fa-lightbulb-o"></i> Value</label>
        <input type="text" id="node-input-slider" placeholder="Value" style="display:none" ><input type="text" id="slidertxt" readonly style=" width:50px"/>

    </div>
    <div class="form-row">
        <div id="slider"></div>
    </div>
</script>
<script type="text/markdown" data-help-name="nrl-value in">
Helper node to modify the dim value (0–100%).

### When to use
Use to enforce a specific brightness value for downstream nodes by setting `msg.payload.dim` to a fixed percentage.

### Inputs
: msg.payload (object) : Norelite message format. Incoming `dim` may be replaced by this node.

### Outputs
: msg.payload (object) : Norelite message format with `msg.payload.dim` set to the configured slider value (0–100).

### Settings
: slider (number) : Percentage value (0–100) used to set `msg.payload.dim`.

### Behaviour
On receipt of a message the node updates `msg.payload.dim` to the configured `slider` value. Valid values are integers between 0 and 100.

### Example Norelite message
: id (string) : Unique message ID that is generated from source/sending node. Used to track and store incoming messages.
: enabled (boolean) : true = On, false = Off
: dim (number) : Dim level (0-100)
: color (string) : Color in hex format
: priority (number) : Priority level (higher number = higher priority)
```json
{
    "id": "556e7ed8b3db354e",
    "enabled": true,
    "dim": 80,
    "color": "#FFFFFF", 
    "priority": 5
}
```        
</script>
<script type="text/javascript">
    /* when opening the form */
    function oneditprepareDatasource() {
        //Set value in txt
        $("#slidertxt").val($("#node-input-slider").val()+"%");

        //Create slider
        $("#slider").slider({
           value: $("#node-input-slider").val(),
            min:0,
            max:100,
            step:5,
            slide: function(event, ui){
                $("#node-input-slider").val(ui.value);
                $("#slidertxt").val(ui.value+"%");
            }
        });
    }
    RED.nodes.registerType('nrl-value in', {
        category: 'norelite_util-input',
        color: "#FFCC66",
        defaults: {
            slider: {value: 100, required:true, validate: RED.validators.number()}
        },
        inputs: 1,
        outputs: 1,
        icon: "light.png",
        //align: "left",
        label: function() {
            return "Set to " + this.slider + "%";
        },
        oneditprepare: oneditprepareDatasource
    });
</script>
