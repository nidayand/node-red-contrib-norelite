<script type="text/markdown" data-help-name="nrl-set in">
Change or override fields in a Norelite-formatted `msg.payload` object.

### When to use
Use `nrl-set` to adjust specific fields of a Norelite payload (for example `enabled`, `priority`, `dim`, or `color`) before forwarding to a downstream node such as `nrl-switch` or a device node.

### Inputs
: msg.payload (object) : Norelite message format.

### Outputs
: msg.payload (object) : Norelite message format with the selected fields modified according to the node settings.

### Settings
: enabled (string) : Configure whether to override `msg.payload.enabled`.
: priority (number) : Change the priority of the message (default 0).
: dim (number) : Dim level (0–100). Leave empty to keep incoming value.
: color (string) : Color hex (e.g. `#FFFFFF`). Leave empty to keep incoming value.

### Behaviour
 When a message arrives the node updates only the fields configured; unspecified fields are left unchanged. Useful to escalate priority or set fixed brightness/color before arbitration in `nrl-switch`.
### Example Norelite message
: id (string) : Unique message ID that is generated from source/sending node. Used to track and store incoming messages.
: enabled (boolean) : true = On, false = Off
: dim (number) : Dim level (0-100)
: color (string) : Color in hex format
: priority (number) : Priority level (higher number = higher priority)
```json
{
    "id": "556e7ed8b3db354e",
    "enabled": true,
    "dim": 80,
    "color": "#FFFFFF", 
    "priority": 5
}
```
