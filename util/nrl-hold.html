<script type="text/x-red" data-template-name="nrl-hold in">
    <div class="form-row">
        <label>&nbsp;</label>
        <input type="checkbox" id="node-input-positive" placeholder="Only" style="display: inline-block; width: auto; vertical-align: top;">
        <label for="node-input-positive" style="width: 70%;">Hold On action</label>
    </div>
    <div class="form-row">
        <label>&nbsp;</label>
        <input type="checkbox" id="node-input-negative" placeholder="Only" style="display: inline-block; width: auto; vertical-align: top;">
        <label for="node-input-negative" style="width: 70%;">Hold Off action</label>
    </div>
    <div class="form-row">
        <label for="node-input-from"><i class="fa fa-clock-o"></i> Hold from</label>
        <select id="node-input-from" style="width:250px !important">
          <option value="0">minimum when it changed state</option>
          <option value="1">when a new state was received</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-timeout"><i class="fa fa-clock-o"></i> For</label>
        <input type="text" id="node-input-timeout" placeholder="Time" style="direction:rtl; width:50px !important">
        <select id="node-input-timeoutUnits" style="width:200px !important">
          <option value="milliseconds">Milliseconds</option>
          <option value="seconds">Seconds</option>
          <option value="minutes">Minutes</option>
          <option value="hours">Hours</option>
          <option value="days">Days</option>
        </select>
    </div>
</script>
<script type="text/markdown" data-help-name="nrl-hold in">
Holds an instruction for a configured time window before allowing the opposite state to pass.

### When to use
: (none) : Use `nrl-hold` to debounce or enforce minimum-on/minimum-off durations for commands (for example, keep a device on for at least N minutes after it turns on).

### Inputs
: msg.payload (object) : Norelite message format.

### Outputs
: msg.payload (object) : Norelite message format. The node forwards messages but may delay or suppress opposite-state messages while the hold timer is active.

### Settings
: positive (boolean) : Hold On — when checked, hold `enabled=true` messages for the configured duration.
: negative (boolean) : Hold Off — when checked, hold `enabled=false` messages for the configured duration.
: from (select) : Hold from — choose when the timer starts: when the hold-state changes or when a new state is received.
: timeout (number + units) : For — the duration of the hold.

### Behaviour
: (none) : If the node is configured to hold a state, it suppresses or delays the opposite state until the configured duration has elapsed according to the selected start behaviour.

### Examples
: (none) : Example — with Hold On = 5 minutes and start = "when it changed state", an incoming `enabled=true` starts the timer and the node will keep the `true` state for at least 5 minutes even if a `false` message arrives earlier.

### References
: (link) : https://www.npmjs.com/package/node-red-contrib-norelite
: (example) : Import -> Examples -> node-red-contrib-norelite -> hold

</script>
<script type="text/javascript">
    /* when opening the form */
    RED.nodes.registerType('nrl-hold in', {
        category: 'norelite_util-input',
        color: "#FFCC66",
        defaults: {
            negative: {value: false},
            positive: {value: true},
            timeout: {value: 5, required: false, validate: RED.validators.number()},
            timeoutUnits: {value: "minutes", required: false},
            from: {value:1, required:true}
        },
        inputs: 1,
        outputs: 1,
        icon: "fa-times-circle-o.png",
        //align: "left",
        label: function() {
            var txt="";
            if (this.positive || this.negative){
                txt+="Hold";
                txt+= (this.positive? " On":"");
                txt+= (this.negative? ((this.positive? "/Off":" Off")) : "");
            } else {
                txt = "No hold";
            }
            return txt;
        }
    });
</script>
