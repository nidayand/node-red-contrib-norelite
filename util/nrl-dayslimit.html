<!-- *********************************************
    Limit on Days node
     ********************************************* -->
<script type="text/x-red" data-template-name="nrl-dayslimit in">
    <div class="form-row">
        <label for="node-input-days"><i class="fa fa-calendar-check-o"></i> Days</label>
        <table style="display: inline-block;">
            <tr>
                <td><input type="checkbox" id="node-input-mon" value="1">Mon</td>
                <td><input type="checkbox" id="node-input-tue" value="1">Tue</td>
                <td><input type="checkbox" id="node-input-wed" value="1">Wed</td>
                <td><input type="checkbox" id="node-input-thu" value="1">Thu</td>
            </tr>
            <tr>
                <td><input type="checkbox" id="node-input-fri" value="1">Fri</td>
                <td><input type="checkbox" id="node-input-sat" value="1">Sat</td>
                <td><input type="checkbox" id="node-input-sun" value="1">Sun</td>
            </tr>
        </table>
    </div>
</script>
<script type="text/markdown" data-help-name="nrl-dayslimit in">
Filters incoming Norelite messages based on the day of the week.

### When to use
: (none) : Use this node to allow or block messages depending on the current weekday.

### Inputs
: msg.payload (object) : Norelite message format.

### Outputs
: msg.payload (object) : Norelite message format. The node sets `msg.payload.enabled = true` when the current weekday is selected; otherwise it sets `msg.payload.enabled = false`.

### Settings
: days (object) : Checkboxes for Mon–Sun to control which weekdays pass `enabled` messages.

### Behaviour
: (none) : If the incoming `msg.payload.enabled` is `true` and the current weekday is selected the enabled state is kept; otherwise `msg.payload.enabled` is set to `false`.

### References
: (link) : https://www.npmjs.com/package/node-red-contrib-norelite

</script>
<script type="text/javascript">
    RED.nodes.registerType('nrl-dayslimit in', {
        category: 'norelite_util-input',
        color: "#FFCC66",
        defaults: {
            mon : {value:true},
            tue : {value:true},
            wed : {value:true},
            thu : {value:true},
            fri : {value:true},
            sat : {value:true},
            sun : {value:true}
        },
        inputs: 1,
        outputs: 1,
        icon: "fa-calendar-check-o.png",
        label: function () {
            var txt ="";
            if (this.mon){
                txt+="Mon"
            }
            if (this.tue){
                txt += (txt!="" ? ",":"")+"Tue";
            }
            if (this.wed){
                txt += (txt!="" ? ",":"")+"Wed";
            }
            if (this.thu){
                txt += (txt!="" ? ",":"")+"Thu";
            }
            if (this.fri){
                txt += (txt!="" ? ",":"")+"Fri";
            }
            if (this.sat){
                txt += (txt!="" ? ",":"")+"Sat";
            }
            if (this.sun){
                txt += (txt!="" ? ",":"")+"Sun";
            }

            return txt;
        }
    });
</script>
