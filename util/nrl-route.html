<script type="text/x-red" data-template-name="nrl-route in">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-bookmark"></i> Name</label>

<script type="text/markdown" data-help-name="nrl-route in">
Routes messages to two outputs based on `msg.payload.enabled`.

### When to use
: (none) : Branch a flow depending on whether the incoming Norelite message indicates enabled (true) or disabled (false).

### Inputs
: msg.payload (object) : Norelite message format.

### Outputs
1. Enabled
: msg.payload (object) : The incoming message forwarded when `msg.payload.enabled === true`.

2. Disabled
: msg.payload (object) : The incoming message forwarded when `msg.payload.enabled === false`.

### Details
: (none) : Utility node that inspects `msg.payload.enabled` and forwards the incoming message to the correct output.

### References
: (link) : https://www.npmjs.com/package/node-red-contrib-norelite

</script>
<script type="text/javascript">
    RED.nodes.registerType('nrl-route in', {
        category: 'norelite_util-input',
        color: "#FFCC66",
        defaults: {
            name: {value: "", required:false}
        },
        inputs: 1,
        outputs: 2,
        icon: "route.png",
        label: function() {
          return (this.name || "route");
        }
    });
</script>
