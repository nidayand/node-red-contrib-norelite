<script type="text/x-red" data-template-name="nrl-timelimit in">
    <div class="form-row">
        <label for="node-input-from"><i class="fa fa-clock-o"></i> From</label>
        <input type="text" id="node-input-from" style=" width:50px">
    </div>
    <div class="form-row">
        <label for="node-input-to"><i class="fa fa-clock-o"></i> To</label>
        <input type="text" id="node-input-to" style=" width:50px">
    </div>

</script>
<script type="text/markdown" data-help-name="nrl-timelimit in">
Limits messages based on the configured time window.

### When to use
Use to allow or block Norelite instructions during a configured time interval (for example office hours).

### Inputs
: msg.payload (object) : Norelite message format. 

### Outputs
: msg.payload (object) : Norelite message format. The node sets `msg.payload.enabled` to true when the current time is within the configured `From`–`To` interval (and the incoming payload indicates enabled); otherwise it sets `msg.payload.enabled` to false.

### Behaviour
The node compares the local current time to the `From` and `To` settings. The interval may span midnight (for example `23:00` to `06:00`). When outside the interval the node forces `msg.payload.enabled = false`.

### Example Norelite message
: id (string) : Unique message ID that is generated from source/sending node. Used to track and store incoming messages.
: enabled (boolean) : true = On, false = Off
: dim (number) : Dim level (0-100)
: color (string) : Color in hex format
: priority (number) : Priority level (higher number = higher priority)
```json
{
    "id": "556e7ed8b3db354e",
    "enabled": true,
    "dim": 80,
    "color": "#FFFFFF", 
    "priority": 5
}
```
</script>
<script type="text/javascript">
    /* when saving the form */
    function oneditsave() {
        var from = $("#node-input-from").val();
        var to = $("#node-input-to").val();
        var eval = function (v) {
            if (v.indexOf(":") == -1) {
                return false;
            }
            var tarr = v.split(":");
            if (tarr.length != 2) {
                return false;
            }
            var h = parseInt(tarr[0]);
            if (isNaN(h) || h < 0 || h > 23) {
                return false;
            }
            var m = parseInt(tarr[1]);
            if (isNaN(m) || m < 0 || m > 59) {
                return false;
            }
            return (h < 10 ? "0" + h : h) + ":" + (m < 10 ? "0" + m : m);
        };
        var nfrom = eval(from);
        var nto = eval(to);
        if (!nfrom){
            alert("Invalid 24h value in From field");
        } else {
            $("#node-input-from").val(nfrom);
        }
        if (!nto){
            alert("Invalid 24h value in To field");
        } else {
            $("#node-input-to").val(nto);
        }
    }
    RED.nodes.registerType('nrl-timelimit in', {
        category: 'norelite_util-input',
        color: "#FFCC66",
        defaults: {
            to: {
                value: "17:00",
                required: true,
                validate: function (v) {
                    if (v.indexOf(":") == -1) {
                        return false;
                    }
                    var tarr = v.split(":");
                    if (tarr.length != 2) {
                        return false;
                    }
                    var h = parseInt(tarr[0]);
                    if (isNaN(h) || h < 0 || h > 23) {
                        return false;
                    }
                    var m = parseInt(tarr[1]);
                    if (isNaN(m) || m < 0 || m > 59) {
                        return false;
                    }
                    return true;
                }
            },
            from: {
                value: "08:00",
                required: true,
                validate: function (v) {
                    if (v.indexOf(":") == -1) {
                        return false;
                    }
                    var tarr = v.split(":");
                    if (tarr.length != 2) {
                        return false;
                    }
                    var h = parseInt(tarr[0]);
                    if (isNaN(h) || h < 0 || h > 23) {
                        return false;
                    }
                    var m = parseInt(tarr[1]);
                    if (isNaN(m) || m < 0 || m > 59) {
                        return false;
                    }
                    return true;
                }
            }
        },
        inputs: 1,
        outputs: 1,
        icon: "fa-clock-o.png",
        label: function () {
            return (this.from && this.to) ? (this.from + "-" + this.to) : "Undefined";
        },
        oneditsave: oneditsave
    });
</script>
