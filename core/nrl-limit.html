<!-- First, the content of the edit dialog is defined.                       -->
<script type="text/x-red" data-template-name="nrl-limit">
    <div id="rate-details" class="form-row">
        <label for="node-input-rate"><i class="fa fa-clock-o"></i> Rate</label>
        <input type="text" id="node-input-rate" placeholder="1" style="direction:rtl; width:30px !important">
        <label for="node-input-rateUnits"> msg(s) per</label>
        <select id="node-input-rateUnits" style="width:140px !important">
          <option value="second">Second</option>
          <option value="minute">Minute</option>
          <option value="hour" >Hour</option>
          <option value="day">Day</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" >
    </div>

</script>

<!-- Next, some simple help text is provided for the node.                   -->
<script type="text/markdown" data-help-name="nrl-limit">
Throttles messages sent to hardware nodes to avoid overloading devices or sending unnecessary repeated commands.

### When to use
The node helps to limit how many messages are sent within a specified time window. It is similar to the node-red limit node but also understands Norelite message format and can drop redundant messages.
If you have hardware node that you need to limit the number of incoming instructions, place this node before the hardware/output node to limit how many messages are forwarded to the device within a time window.

### Inputs
: msg.payload (object) : Device-specific instruction message. The node expects Norelite-formatted messages (for example `msg.payload.instruction` containing the device instruction object).

### Outputs
: msg.payload (object) : Device-specific instruction message forwarded according to the configured rate.

### Settings
: rate (number) : Number of messages allowed per selected time unit (second, minute, hour, day).
: name (string) : Free-form label for the node.

### Behaviour
The node queues incoming instructions and forwards at most the configured number of messages per time unit. If a new instruction arrives that differs from a queued instruction, the earlier one may be dropped to avoid redundant commands.

### Examples
Throttle a burst of sensor-triggered commands so the device only receives one command per minute.

</script>

<!-- Finally, the node type is registered along with all of its properties   -->
<script type="text/javascript">
    RED.nodes.registerType('nrl-limit',{
        category: 'norelite-input',      // the palette category
        color:"#E2D96E",
        defaults: {             // defines the editable properties of the node
            name: {value:""},   //  along with default values.
            rate: {value:"30", required:true, validate:RED.validators.number()},
            rateUnits: {value: "minute"}
        },
        inputs:1,                // set the number of inputs - only 0 or 1
        outputs:1,               // set the number of outputs - 0 to n
        icon: "timer.png",    // set the icon (held in public/icons)
        label: function() {      // sets the default label contents
              var units = this.rateUnits ? this.rateUnits.charAt(0) : "s";
              return this.name|| "limit "+this.rate+" msg/"+units;
        },
        oneditprepare: function() {
          $( "#node-input-rate" ).spinner({min:1});
        }
    });
</script>
