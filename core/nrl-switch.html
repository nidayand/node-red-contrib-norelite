<script type="text/x-red" data-template-name="nrl-switch-config">
    <div class="form-row">
        <label for="node-config-input-times"><i class="fa fa-clock-o"></i> Repeat send</label>
        <input type="text" id="node-config-input-times" style="width:50px !important">
    </div>
    <div class="form-row">
        <label for="node-config-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-config-input-name" placeholder="Name">
    </div>
</script>
<script type="text/javascript">
    RED.nodes.registerType('nrl-switch-config', {
        category: 'config',
        color: "rgb(218, 196, 180)",
        defaults: {
            times: {value: 3, required: true, validate: RED.validators.number()},
            name: {value: ""}
        },
        label: function () {
            return this.name || (this.times + " times");
        }
    });
</script>
<script type="text/x-red" data-template-name="nrl-switch out">
    <div class="form-row">
        <label for="node-input-timeout"><i class="fa fa-clock-o"></i> Send code</label>
        <input type="text" id="node-input-times" placeholder="Number">
    </div>
    <div id="repeat-details" class="form-row">
        <label for="node-input-timeout"><i class="fa fa-clock-o"></i> Repeat every</label>
        <input type="text" id="node-input-repeat" placeholder="Time" style="direction:rtl; width:50px !important">
        <select id="node-input-repeatUnits" style="width:200px !important">
          <option value="milliseconds">Milliseconds</option>
          <option value="seconds">Seconds</option>
          <option value="minutes">Minutes</option>
          <option value="hours">Hours</option>
          <option value="days">Days</option>
        </select>
    </div>
    <div class="form-row">
        <label>&nbsp;</label>
        <input type="checkbox" id="node-input-once" placeholder="Only" style="display: inline-block; width: auto; vertical-align: top;">
        <label for="node-input-once" style="width: 70%;">Disable repeat</label>
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-bookmark"></i> Name</label>
        <input type="text" id="node-input-name">
    </div>

</script>
<script type="text/markdown" data-help-name="nrl-switch out">
Collects Norelite messages from multiple sources, stores them, and resolves a single outbound Norelite message according to precedence rules. This node is the central arbiter when multiple automations/rules conflict: it decides which rule wins and emits the final command for a device (for example, whether a light should be turned on or off).

### When to use
: (none) : Use when several flows or rules may control the same device and you need a single resolved command that respects priority and intended precedence.

### Inputs
: msg.payload (object) : Norelite message object representing a proposed device command.

### Outputs
: msg.payload (object) : Norelite message object representing the resolved command chosen by the node.

### Properties (editor settings)
: times (config) : Send code — how many times the resolved output is emitted (`nrl-switch-config`).
: repeat / repeatUnits (number/string) : Repeat every — interval used to schedule a single-shot repeat of the resolved output.
: once (boolean) : Disable repeat — when true the node only sends on changes.
: name (string) : Node label.

### Behaviour
: (none) : Stores incoming Norelite messages, debounces rapid updates (~1s), then resolves a single outbound message using precedence rules:
1. Higher `msg.payload.priority` wins.
2. If equal, `enabled: true` wins over `enabled: false`.
3. If still equal, higher `msg.payload.dim` wins (and determines `msg.payload.color`).

: Emission : When the resolved output differs from the last sent output the node sends it `times` times immediately and (unless `once` is set) schedules a single-shot repeat after the configured interval. Unchanged results are not re-sent except for scheduled repeats.

### References
: (link) : https://www.npmjs.com/package/node-red-contrib-norelite

</script>
<script type="text/javascript">
    RED.nodes.registerType('nrl-switch out', {
        category: 'norelite-output',
        color: "#E2D96E",
        defaults: {
            name: {value: "", required: false},
            times: {type: "nrl-switch-config", required: true},
            repeat: {value: 10, required: true, validate: RED.validators.number()},
            repeatUnits: {value: "minutes", required: false},
            once: {value: false, required: false}
        },
        inputs: 1,
        outputs: 1,
        icon: "fa-power-off.png",
        align: "right",
        label: function() {
            return (this.name || "switch");
        },
        oneditprepare: function(){
            $("#node-input-once").change(function() {
              if ($("#node-input-once").is(':checked')) {
                $("#repeat-details").hide();
              } else {
                $("#repeat-details").show();
              }
            });
        }
    });
</script>
