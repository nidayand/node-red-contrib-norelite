<script type="text/x-red" data-template-name="nrl-source out">
    <div class="form-row">
        <label for="node-input-config"><i class="fa fa-bookmark"></i> Config</label>
        <input type="text" id="node-input-config">
    </div>
    <div class="form-row" id="default-details">
        <label for="node-input-def"><i class="fa fa-bookmark"></i> Initial value</label>
        <input type="text" id="node-input-def">
    </div>
    <div class="form-row">
        <label>&nbsp;</label>
        <input type="checkbox" id="node-input-expire" placeholder="Only" style="display: inline-block; width: auto; vertical-align: top;">
        <label for="node-input-expire" style="width: 70%;">Value can expire</label>
    </div>
    <div id="expire-details">
        <div class="form-row">
            <label for="node-input-timeout"><i class="fa fa-clock-o"></i> For</label>
            <input type="text" id="node-input-timeout" placeholder="Time" style="width:50px !important">
            <select id="node-input-timeoutUnits" style="width:200px !important">
              <option value="milliseconds">Milliseconds</option>
              <option value="seconds">Seconds</option>
              <option value="minutes">Minutes</option>
              <option value="hours">Hours</option>
              <option value="days">Days</option>
            </select>
        </div>
        <div class="form-row" id="expire-value">
            <label for="node-input-expval"><i class="fa fa-bookmark"></i> Expiration value</label>
            <input type="text" id="node-input-expval">
        </div>
    </div>
    <div class="form-row">
        <label>&nbsp;</label>
        <input type="checkbox" id="node-input-toggle" placeholder="Only" style="display: inline-block; width: auto; vertical-align: top;">
        <label for="node-input-toggle" style="width: 70%;">Toggle (0/1)</label>
    </div>
    <div class="form-row">
        <label>&nbsp;</label>
        <input type="checkbox" id="node-input-cycle" placeholder="Only" style="display: inline-block; width: auto; vertical-align: top;">
        <label for="node-input-cycle" style="width: 70%;">Cycle (0 to n)</label>
    </div>
    <div id="cycle-details">
        <div class="form-row">
            <label for="node-input-cyclen"><i class="fa fa-clock-o"></i> Cycle to </label>
            <input type="text" id="node-input-cyclen" placeholder="number" style="width:50px !important">
        </div>
    </div>
    <div class="form-row">
        <label>&nbsp;</label>
        <input type="checkbox" id="node-input-output" placeholder="Only" style="display: inline-block; width: auto; vertical-align: top;">
        <label for="node-input-output" style="width: 70%;">Use output</label>
    </div>
    <div class="form-row">
      <label>&nbsp;</label>
      <input type="checkbox" id="node-input-save" placeholder="Only" style="display: inline-block; width: auto; vertical-align: top;">
      <label for="node-input-save" style="width: 70%;">Persistant value (flow)</label>
    </div>
  <div class="form-row" id="hysteresis-details">
        <label for="node-input-hysteresis"><i class="fa fa-bookmark"></i> Hysteresis</label>
        <input type="text" id="node-input-hysteresis" style="width:50px">
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-bookmark"></i> Name</label>
        <input type="text" id="node-input-name">
        <input type="hidden" id="node-input-uid"/>
    </div>

</script>
<script type="text/markdown" data-help-name="nrl-source out">
Exposes and stores a single named value for evaluation nodes. Optionally forwards the value, persists it to flow context, applies hysteresis, provides toggle/cycle behaviour, and can expire to a fallback value.

### When to use
Use when you need a single source-of-truth value for rules/evaluations, a simple toggle or counter, or to persist/restore a value across deploys/restarts.

### Inputs
: msg.payload (object|string|number|boolean) : Incoming value. If the payload is a Norelite message object the node uses `msg.payload.enabled`. Numeric strings are converted to numbers.
: msg.reset (boolean) : Optional. When `true` resets toggle/cycle to `0`, or sets payload to the configured Initial value.

### Outputs
: msg.payload (object|string|number|boolean) : Emitted when **Use output** is enabled and the node accepts a change.

### Properties (editor settings)
: config (nrl-config) : Global configuration node. Use the same config node for related nrl-source and nrl-eval nodes. It is used to emit changes from nrl-source nodes to linked nrl-eval nodes so they can re-evaluate their rules.
: Initial value (any) : Initial value emitted on deploy if no saved value exists.
: Value Can Expire / Expval (boolean/any) : Value can expire and fall back to `expval` after timeout.
: Toggle (boolean) : Toggle mode — flip between 0 and 1 on each input.
: Cycle (boolean) : Cycle mode — increment 0..cyclen on each input.
: Persistent value (flow) (boolean) : Store last value in flow context and restore on deploy.
: Use output (boolean) : Use output — forward accepted value to downstream nodes.
: Hysteresis (number) : Numeric threshold — changes smaller than this are ignored.

### Behaviour
On deploy the node restores a saved flow value (if `save` enabled) or emits the configured Initial value after ~1s. On input, toggle/cycle modes override the incoming payload; Norelite-format messages use `msg.payload.enabled`. Hysteresis applies only to numeric comparisons. Accepted values are emitted to evaluation nodes (deduplicated), optionally forwarded, saved to flow context, and may start an expiration timer that emits when it fires.

### Examples
Toggle button — wire an Inject node to this node with **Toggle** enabled to flip between `0` and `1`. Persistent sensor — enable **Use output** and **Persistant value (flow)** to restore the last value after restart.

### Notes
- Emissions to evaluation nodes are deduplicated. Hysteresis only applies to numeric comparisons.
- Persistence requires a configured context store to survive Node-RED restarts. See details at https://nodered.org/docs/user-guide/context on how to configure context storage and to store data to the local filesystem (default is in-memory only).

</script>
<script type="text/javascript">
  function oneditprepareDatasource() {
    var expChange = function() {
      if ($("#node-input-expire").is(':checked')) {
        $("#expire-details").show();
      } else {
        $("#expire-details").hide();
      }
    }
    var cycleChange = function() {
      if ($("#node-input-cycle").is(':checked')) {
        $("#cycle-details").show();
        $("#expire-value").hide();
        $("#default-details").hide();
        $("#hysteresis-details").hide();

        //Disable toggle
        $("#node-input-toggle").prop('checked', false);
      } else {
        $("#cycle-details").hide();
        $("#default-details").show();
        $("#expire-value").show();
        $("#hysteresis-details").show();
      }
    }
    var toggleChange = function() {
      if ($("#node-input-toggle").is(':checked')) {
        $("#default-details").hide();
        $("#expire-value").hide();
        $("#hysteresis-details").hide();
        $("#cycle-details").hide();

        //Disable cycle
        $("#node-input-cycle").prop('checked', false);
      } else {
        $("#default-details").show();
        $("#expire-value").show();
        $("#hysteresis-details").show();
      }
    }
    $("#node-input-expire").change(expChange);
    $("#node-input-cycle").change(cycleChange);
    $("#node-input-toggle").change(toggleChange);

    //Call all to set init values with delay
    if ($("#node-input-expire").is(':checked')) setTimeout(expChange,100);
    if ($("#node-input-cycle").is(':checked')) setTimeout(cycleChange,100);
    if ($("#node-input-toggle").is(':checked')) setTimeout(toggleChange,100);
  }
  RED.nodes.registerType('nrl-source out', {
    category: 'norelite-output',
    color: "#E2D96E",
    defaults: {
      config: {
        type: "nrl-config",
        required: true
      },
      uid: {
        value: "",
        required: true
      },
      name: {
        value: "",
        required: true
      },
      def: {
        value: "",
        required: false
      },
      expire: {
        value: false,
        required: true
      },
      timeout: {
        value: 100,
        required: false,
        validate: RED.validators.number()
      },
      timeoutUnits: {
        value: "seconds",
        required: false
      },
      expval: {
        value: false,
        required: false
      },
      output: {
        value: false,
        required: true
      },
      hysteresis: {
        value: 0,
        required: true,
        validate: RED.validators.number()
      },
      toggle: {
        value: false,
        required: true
      },
      cycle: {
        value: false,
        required: true
      },
      cyclen: {
        value: "3",
        required: false
      },
      save: {
        value: false,
        required: false
      },
      outputs: {
        value: 0
      } //Storing if outputs is enabled. To be able to copy the node.
    },
    inputs: 1,
    outputs: 0,
    icon: "fa-hdd-o.png",
    align: "right",
    label: function() {
      return (this.name || "undefined");
    },
    oneditprepare: oneditprepareDatasource,
    oneditsave: function() {
      var node = this;
      if ($("#node-input-output").is(":checked")) {
        node.outputs = 1;
      } else {
        node.outputs = 0;
      }
      //Set default value =0 when toggle mode is on
      //and hysteresis to 0
      if ($("#node-input-toggle").is(":checked") || $("#node-input-cycle").is(":checked")) {
        $("#node-input-def").val('0');
        $("#node-input-hysteresis").val('0');
        //If expiration is set, set the expiration value to 0
        if ($("#node-input-expire").is(":checked")) {
          $("#node-input-expval").val('0');
        }
      }
    },
    onpaletteadd: function(){
      /* Monitor if a node is added and generate a unique id based on
      timestamp. This timestamp is used to create the MQTT message and
      the nrl-eval nodes knows to which message to subscribe to */
      RED.events.on('nodes:add', function(n){
        if (n.type == 'nrl-source out'){
          //Generate GUID
          var S4 = function(){
            return (((1+Math.random())*0x10000)|0).toString(16).substring(1);
          }
          var guid = function(){
            return (S4() + S4() + "-" + S4() + "-4" + S4().substr(0,3) + "-" + S4() + "-" + S4() + S4() + S4()).toLowerCase();
          }

          if (n.uid == ''){
            // if uid is empty fill with guid
            n.uid = guid();
          } else {
            /* if uid is available, check that there are no
            other nodes with the same id. If available generate
            a new. This enables copy of nodes as well as importing
            of flows/nodes */
            RED.nodes.eachNode(function(cf){
              if (cf.type == 'nrl-source out' && cf.uid == n.uid && cf.id !== n.id){
                n.uid = guid();
              }
            });
          }

        }
      });
    }
  });
</script>
