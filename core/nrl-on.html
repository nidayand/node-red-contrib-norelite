<script type="text/markdown" data-help-name="nrl-on in">
Sends a periodic "On" instruction in Norelite message format.

### When to use
: (none) : Use this node as a simple periodic trigger that emits an "On" command for testing or to drive downstream flows.

### Outputs
: msg.payload (object) : Norelite message format representing the periodic "On" instruction.

### Details
: (none) : This minimal node emits a Norelite-style message representing an "On" instruction at its configured interval. It can be used to start flows or provide a steady-state message for testing.

### References
